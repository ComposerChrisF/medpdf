# cargo-release configuration — PUBLISH-ONLY (workspace: medpdf + medpdf-image).
#
# Versions in this workspace are owned by verset / the /commit-* skills, which
# bump and commit on every change.  cargo-release is therefore NEVER used to
# bump or commit here — only its `publish`, `tag`, and `push` STEP subcommands
# are run, against the already-committed current versions.  See PUBLISHING.md.
#
# Publish the family bottom-up.  --workspace publishes members in dependency
# order (medpdf, then medpdf-image); pdf-test-visual is excluded via its own
# [package.metadata.release] release = false.
#
#   cargo release publish --workspace   # dry-run; -x to publish medpdf then medpdf-image
#   cargo release tag --workspace       # tag <crate>-v<version> on the current commit
#   cargo release push --workspace      # push the tags to origin
#
# NOTE on dry-run: `publish --workspace` verifies each crate by compiling its
# packaged form.  medpdf-image's verify needs medpdf's new version ON crates.io,
# which a dry-run has not uploaded, so medpdf-image may fail to verify in dry-run
# alone.  That is expected; the real `-x` run publishes medpdf first, so the
# version is available when medpdf-image is verified.
#
# Do NOT run `cargo release <level>` or `cargo release version` here: that would
# bump the versions and collide with the commit-skill / verset workflow.

# Only release from main.
allow-branch = ["main"]

# Family-wide tag convention: <crate>-v<version> (e.g. medpdf-v0.11.0), so tags
# are unambiguous across repos and match scripts/publish-status.py.
tag-name = "{{crate_name}}-v{{version}}"
